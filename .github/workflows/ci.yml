name: PersonaTwin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run linter
        run: npx --yes markdownlint-cli "**/*.md" --ignore node_modules

      - name: Verify Replicas Sync
        run: |
          diff_output=$(diff -rq --exclude=.git --exclude=.agents --exclude=.github --exclude=node_modules . ./.agents/skills/personatwin/ || true)
          if [ -n "$diff_output" ]; then
            echo "Error: The .agents/skills/personatwin directory is out of sync with the root directory."
            echo "Differences found:"
            echo "$diff_output"
            echo "Please run 'rsync -av --exclude=.git --exclude=.github --exclude=.agents --exclude=node_modules ./ ./.agents/skills/personatwin/'"
            exit 1
          fi


  test:
    name: Prompt Evaluation (promptfoo)
    runs-on: ubuntu-latest
    needs: lint
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run prompt evaluation tests
        run: npm run test
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: |
            .promptfoo/
            promptfoo-output.json
          retention-days: 7
